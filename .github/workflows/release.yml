name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for creating the GitHub Release
      id-token: write   # required for npm provenance attestations
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION doesn't match package.json $PKG_VERSION"
            exit 1
          fi

      # Use npm (not pnpm) for the publish step. npm 11.5+ handles the
      # trusted-publisher OIDC handshake (exchange GH id-token for a
      # short-lived publish token); pnpm publish does not. Run via npx
      # so we get a fresh-resolved npm without corrupting the runner's
      # in-place global npm via self-upgrade.
      - name: Publish (via fresh npm@latest)
        run: npx -y npm@latest publish --access public --provenance

      - name: Extract changelog section for this version
        id: changelog
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk -v ver="$TAG_VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See CHANGELOG.md for details."
          fi
          {
            echo 'body<<CHANGELOG_EOF'
            echo "$BODY"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --verify-tag
