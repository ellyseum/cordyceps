name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify package tarball contents
        run: |
          # Same publish path the release workflow uses (pnpm publish), so
          # the tarball we inspect here matches what users actually install.
          pnpm pack --pack-destination /tmp >/dev/null
          tar -tzf /tmp/ellyseum-cordyceps-*.tgz > /tmp/files.txt
          node -e "
            const fs = require('fs');
            const names = fs.readFileSync('/tmp/files.txt','utf8')
              .split('\n').filter(Boolean)
              .map(l => l.replace(/^package\\//, ''));
            const required = ['LICENSE', 'README.md', 'package.json'];
            const banned = [/^test\\//, /^src\\//, /^specs\\//, /\\.test\\.[jt]s$/];
            for (const r of required) {
              if (!names.includes(r)) { console.error('Missing from tarball:', r); process.exit(1); }
            }
            for (const n of names) {
              for (const b of banned) {
                if (b.test(n)) { console.error('Should not be in tarball:', n); process.exit(1); }
              }
            }
            console.log('Tarball contents OK:', names.length, 'files');
          "
